apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-role
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "create", "delete", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: webhook-sa
  namespace: default
roleRef:
  kind: Role
  name: webhook-role
  apiGroup: rbac.authorization.k8s.io
  