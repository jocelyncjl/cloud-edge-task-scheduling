apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-handler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      serviceAccount: webhook-sa
      containers:
        - name: webhook
          image: webhook-handler
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001


---
apiVersion: v1
kind: Service
metadata:
  name: webhook-handler-service
spec:
  selector:
    app: webhook
  ports:
    - port: 5001
      targetPort: 5001

    


    