apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-task-cloud
  labels:
    app: flask-task
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-task
  template:
    metadata:
      labels:
        app: flask-task
    spec:
      nodeSelector:
        node-role: cloud
      containers:
        - name: flask-container
          image: flask-tasks-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 1
            limits:
              cpu: 8
            
    

  
